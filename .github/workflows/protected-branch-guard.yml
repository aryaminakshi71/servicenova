name: Protected Branch Guard

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  governance_guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Evaluate Protected Branch Governance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/ci/verify-protected-branch-governance.mjs
